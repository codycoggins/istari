server {
    listen 80;
    root /usr/share/nginx/html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Prevent this page being embedded in an iframe on any other origin.
    add_header X-Frame-Options "DENY" always;

    # Stop browsers from MIME-sniffing a response away from the declared type.
    add_header X-Content-Type-Options "nosniff" always;

    # Send the origin on same-origin requests; strip it to just the scheme+host
    # on cross-origin requests (e.g. Google Fonts fetch).
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    #
    # style-src requires 'unsafe-inline' because React components use inline
    # style={{}} props throughout the codebase.  fonts.googleapis.com is needed
    # for the @import in globals.css.
    #
    # Strict-Transport-Security is intentionally absent here: nginx cannot tell
    # whether it is behind HTTPS (ngrok) or plain HTTP (local dev).  Setting
    # HSTS on an HTTP response would cause browsers to cache a "must be HTTPS"
    # rule that would break http://localhost.  Add HSTS at the reverse-proxy or
    # CDN layer when you know you are serving over a permanent HTTPS endpoint.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data:; \
         connect-src 'self'; \
         frame-ancestors 'none'; \
         object-src 'none'; \
         base-uri 'self'"
        always;

    # ── Proxy /api → FastAPI backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket upgrade (required for /api/chat/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Keep idle WebSocket connections open (default 60s would drop chat)
        proxy_read_timeout 86400;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
